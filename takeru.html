<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>尊琉さんのこえ</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            background: #000; 
            color: #fff; 
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        
        .container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            padding: 15px; 
            padding-bottom: 50px;
        }

        /* ★ボタンの文字色をすべて「黒(#000)」に固定 */
        button { 
            border: none; 
            border-radius: 15px; 
            font-size: 1.1rem; 
            font-weight: 900; /* 文字を最大限太く */
            padding: 10px 5px; 
            min-height: 80px; 
            color: #000 !important; /* 文字色を黒に強制 */
            cursor: pointer; 
            box-shadow: 0 4px #444; /* 影を少し明るくしてボタンを際立たせる */
            word-break: keep-all; 
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            line-height: 1.3;
        }

        button:active { 
            transform: translateY(4px);
            box-shadow: 0 0px #444; 
        }

        /* 背景色を少し明るくして、黒い文字が読みやすいように調整 */
        .red { background: #ff453a; grid-column: span 2; font-size: 1.5rem; }
        .purple { background: #d08df2; }
        .blue { background: #5da9ff; }
        .orange { background: #ff9f0a; }
        .green { background: #32d74b; }
        .indigo { background: #7d7aff; }

        .overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top));
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            box-sizing: border-box; 
            z-index: 1000; 
            align-content: center;
        }

        .overlay h2 { color: #fff; margin: 0 0 10px 0; }

        /* サブボタン（選択肢）も文字を黒にする */
        .sub-btn { background: #eee; font-size: 1.4rem; font-weight: 900; }
        .close { background: #acacb0; grid-column: span 2; min-height: 70px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <button class="red" onclick="speak('すぐ来てください！')">🆘 すぐ来て！</button>
        <button class="purple" onclick="speak('怒っています。理由を聞いてください')">💢 怒ってる</button>
        <button class="purple" onclick="speak('とても嫌です')">🙅 とても嫌</button>
        <button class="purple" onclick="speak('不安です')">😟 不安です</button>
        <button class="purple" onclick="speak('怖いです')">😨 怖いです</button>
        <button class="purple" onclick="speak('悲しいです')">😢 悲しい</button>
        <button class="orange" onclick="showParts('が痛いです')">⚡ 痛い</button>
        <button class="orange" onclick="showParts('がかゆいです')">✋ かゆい</button>
        <button class="orange" onclick="showParts('を揉んでください')">💆 揉んで</button>
        <button class="orange" onclick="showParts('に手を当てて')">🤲 手を当てて</button>
        <button class="indigo" onclick="showBed('背中')">⤴️ 背中調整</button>
        <button class="indigo" onclick="showBed('足')">⤴️ 足調整</button>
        <button class="blue" onclick="speak('トイレに行きたいです')">🚽 トイレ</button>
        <button class="blue" onclick="speak('しんどいです')">😫 しんどい</button>
        <button class="blue" onclick="speak('寒いです。熱かも')">❄️ 寒い</button>
        <button class="blue" onclick="speak('暑いです。薬効いたかも')">🔥 暑い</button>
        <button class="blue" onclick="speak('気分が悪いです')">🤢 気分悪い</button>
        <button class="blue" onclick="speak('吐きそうです')">🤮 吐きそう</button>
        <button class="blue" onclick="speak('起き上がりたい')">🧍 起きたい</button>
        <button class="green" onclick="speak('飲み物ください')">💧 飲み物</button>
        <button class="green" onclick="speak('食べたいです')">🍞 食べたい</button>
        <button class="green" onclick="speak('お腹すきました')">🤤 お腹すいた</button>
        <button class="green" onclick="speak('ティッシュください')">🤧 ﾃｨｯｼｭ</button>
        <button class="green" onclick="speak('薬のみます')">💊 薬のむ</button>
        <button class="green" onclick="speak('着替えたいです')">👕 着替え</button>
    </div>

    <div id="part-overlay" class="overlay">
        <h2 style="grid-column:span 2; text-align:center;">どこ？</h2>
        <button class="sub-btn" onclick="donePart('頭')">頭</button>
        <button class="sub-btn" onclick="donePart('首・肩')">首・肩</button>
        <button class="sub-btn" onclick="donePart('腕・手')">腕・手</button>
        <button class="sub-btn" onclick="donePart('お腹')">お腹</button>
        <button class="sub-btn" onclick="donePart('背中')">背中</button>
        <button class="sub-btn" onclick="donePart('足')">足</button>
        <button class="close" onclick="closeAll()">× 戻る</button>
    </div>

    <div id="bed-overlay" class="overlay">
        <h2 style="grid-column:span 2; text-align:center;">どうする？</h2>
        <button class="sub-btn" style="background:#ff9f0a" onclick="doneBed('上げてください')">⬆️ 上げる</button>
        <button class="sub-btn" style="background:#32d74b" onclick="doneBed('下げてください')">⬇️ 下げる</button>
        <button class="close" onclick="closeAll()">× 戻る</button>
    </div>

    <script>
        let curAct = ""; let curBed = "";
        const synth = window.speechSynthesis;
        let isAudioInitialized = false;

        function speak(t) { 
            if (t === "") return;
            synth.cancel(); 
            const u = new SpeechSynthesisUtterance(t); 
            u.lang = 'ja-JP'; 
            u.rate = 1.0; 
            synth.speak(u); 
        }

        function showParts(a) { curAct = a; document.getElementById('part-overlay').style.display = 'grid'; }
        function donePart(p) { speak(p + curAct); closeAll(); }
        function showBed(b) { curBed = b; document.getElementById('bed-overlay').style.display = 'grid'; }
        function doneBed(a) { speak('ベッドの' + curBed + 'を' + a); closeAll(); }
        function closeAll() { document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none'); }
        
        document.body.addEventListener('touchstart', () => { 
            if (!isAudioInitialized) {
                const u = new SpeechSynthesisUtterance('');
                synth.speak(u);
                isAudioInitialized = true;
            }
        }, { once: true, passive: true });
    </script>
</body>
</html>
